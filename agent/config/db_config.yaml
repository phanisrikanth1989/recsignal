# RecSignal DB Collector Configuration
# -----------------------------------------------------------
# DB instances are defined in a pipe-delimited file:
#   db_instances_file: config/db_instances.cfg
#
# Format per line:
#   environment|schema:DBNAME|host|port|schema|servicename|oraclehomepath
#
# Password retrieval:
#   password_script is called with 2 args: DBNAME and schema
#   e.g.  /opt/recsignal/bin/get_db_password.sh ORCL_UAT1 recsignal_mon
# -----------------------------------------------------------

backend_url: "http://localhost:8000/api/db-monitor/metrics"
api_key: "sample-secret-key"
interval_seconds: 30
password_script: /opt/recsignal/bin/get_db_password.sh
db_instances_file: config/db_instances.cfg
